worker_id: "vps-worker-1"
api_port: 8080
redis_url: "${REDIS_URL}"
autostart_accounts: false

paths:
  base_dir: "/opt/flow-worker"
  chrome_profiles_dir: "/chrome-profiles"
  extension_dir: "/extension"
  runtime_extension_dir: "/tmp/flow-worker-extensions"
  accounts_dir: "/worker/accounts"
  logs_dir: "/worker/logs"

browser:
  chrome_binary: "google-chrome"
  remote_debugging_host: "127.0.0.1"
  remote_debugging_start_port: 12000
  default_flow_url: "https://labs.google/fx/tools/flow"
  launch_timeout_seconds: 45
  navigation_timeout_ms: 60000
  extra_args:
    - "--no-sandbox"
    - "--disable-gpu"
    - "--disable-software-rasterizer"
    - "--disable-gpu-compositing"
    - "--disable-gpu-rasterization"
    - "--disable-accelerated-2d-canvas"
    - "--disable-accelerated-video-decode"
    - "--disable-background-timer-throttling"
    - "--disable-renderer-backgrounding"

vnc:
  display_start: 100
  vnc_start_port: 5901
  novnc_start_port: 6080
  novnc_web_dir: "/opt/noVNC"
  width: 1280
  height: 720
  depth: 24
  password: null

queue:
  name: "flow_jobs"
  max_retries: 3
  retry_delay_seconds: 60
  scheduler_interval_seconds: 1.0
  job_timeout_seconds: 900

recovery:
  enabled: true
  max_attempts: 3
  cooldown_seconds: 120

flowkit:
  enabled: true
  ws_host: "127.0.0.1"
  ws_start_port: 9222

flow_settings:
  text_to_image:
    model: "nano-banana-2"
    estimated_credits: 20
    presets: {}
  image_to_image:
    model: "nano-banana-2-edit"
    estimated_credits: 25
    presets: {}
  text_to_video:
    model: "veo-3.1-fast"
    duration: 8
    estimated_credits: 160
    presets: {}
  image_to_video:
    model: "veo-3.1-quality"
    duration: 8
    estimated_credits: 300
    presets: {}
