worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /tmp/nginx-access.log;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_name _;

        client_max_body_size 50m;

        # ── Worker API ──────────────────────────────────────────
        location /api/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Worker API (direct paths) ──────────────────────────
        location ~ ^/(health|accounts|jobs|workers|flow-settings|flow-models|metrics|media|extensions|generate) {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── FastAPI docs ───────────────────────────────────────
        location /docs {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }

        # ── noVNC Web Viewer ───────────────────────────────────
        location /vnc/ {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ── noVNC WebSocket ────────────────────────────────────
        location /websockify {
            proxy_pass http://127.0.0.1:6080/websockify;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ── VNC WebSocket (per-account) ────────────────────────
        location ~ ^/ws/(\d+)/(.*) {
            set $vnc_port $1;
            set $vnc_path $2;
            proxy_pass http://127.0.0.1:$vnc_port/$vnc_path;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # ── Default (serve static or SPA) ──────────────────────
        location / {
            return 200 '{"status":"ok","service":"flowkit-worker","api":"/health","vnc":"/vnc/"}';
            add_header Content-Type application/json;
        }
    }
}
